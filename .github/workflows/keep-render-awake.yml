name: Keep Render Bot Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot health endpoint
        env:
          RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL || 'https://rgx-telegram-bot.onrender.com/health' }}
        run: curl -fsS --max-time 20 "$RENDER_HEALTH_URL" || true
