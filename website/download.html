<!DOCTYPE html>
<html lang="en">
<head>

    /* modern glassmorphic + dark premium theme */

      --accent-glow: #00c3ff;
      --accent-primary: #2b6eff;
      --accent-secondary: #9f7aff;
      --text-primary: #f0f3fa;
      --text-secondary: #9aa4bf;

      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(1px);

      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;

      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(72, 187, 255, 0.2);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand .brand-mark {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent-glow));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 0 8px rgba(0, 195, 255, 0.2);
    }

    .topnav {

    }

    .topnav a {

      text-decoration: none;
      font-weight: 500;

      font-size: 0.95rem;
      letter-spacing: 0.3px;

    .topnav a:hover {

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .download-panel {

    .download-panel:hover {

    }

    .download-status {
      display: inline-block;
      background: rgba(43, 110, 255, 0.18);

      padding: 0.3rem 1.2rem;
      border-radius: 40px;

      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-glow);
      border: 1px solid rgba(0, 195, 255, 0.4);
      margin-bottom: 1.5rem;
    }

    /* file visual: modern 3D style */
    .file-visual {
      width: 90px;
      height: 110px;
      background: linear-gradient(145deg, #161e2c, #0c1120);
      margin: 0 auto 1.5rem;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--accent-glow);
      box-shadow: 0 20px 35px -8px black, inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .file-visual:after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 20%;
      width: 60%;
      height: 6px;
      background: var(--accent-glow);
      border-radius: 3px;
      filter: blur(3px);
      opacity: 0.6;
    }

    .kicker {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent-secondary);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(125deg, #fff, #bdd3ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 0.5rem 0 0.3rem;
    }

    .muted {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.2rem;
    }

    .caption {
      font-size: 0.8rem;
      color: #7d8bb0;
      margin: 0.75rem 0 1rem;
    }

    /* timer ring - upgraded ring */
    .timer-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 1.2rem auto 1.5rem;
    }

    .timer-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 8;
    }

    .progress {
      fill: none;
      stroke: url(#gradRing);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 326.56;
      stroke-dashoffset: 326.56;
      transition: stroke-dashoffset 0.1s linear;
      filter: drop-shadow(0 0 5px #3a86ff);
    }

    .timer-wrap > div {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-weight: 700;
    }

    .timer-wrap strong {
      font-size: 2.2rem;
      font-weight: 800;
      display: block;
      line-height: 1;
      color: white;
      text-shadow: 0 0 8px var(--accent-glow);

    .timer-wrap span {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
    }

      font-weight: 600;
      padding: 0.9rem 1.8rem;
      border-radius: 60px;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      text-align: center;

      box-shadow: 0 8px 20px rgba(43, 110, 255, 0.3);

      filter: brightness(1.05);
    }

    .btn.primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      filter: grayscale(0.1);
    }

    .btn.ghost {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn.ghost:hover {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border-color: var(--accent-glow);
    }

    .wide {
      width: 100%;
      margin-top: 0.5rem;
    }

    .hidden {
      display: none;
    }

    /* dialog premium overlay */
    .redirect-dialog {
      position: fixed;
      inset: 0;
      background: rgba(2, 5, 12, 0.85);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: all 0.2s;
    }

    .redirect-dialog > div {
      background: var(--surface-elevated);
      border: 1px solid rgba(0, 195, 255, 0.5);
      border-radius: 2.5rem;
      padding: 2rem 2rem 2rem;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
      animation: floatPop 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes floatPop {
      0% { opacity: 0; transform: scale(0.96) translateY(10px);}
      100% { opacity: 1; transform: scale(1) translateY(0);}
    }

    .redirect-dialog h2 {
      font-size: 1.7rem;
      margin: 0.5rem 0 0.5rem;
    }

    .redirect-dialog p {
      color: var(--text-secondary);
      margin-bottom: 1.4rem;
      font-size: 0.9rem;
    }

    .dialog-loader {
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }

    .dialog-loader span {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid var(--accent-glow);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* fallback adjustments */
    #fallbackBtn {
      margin-top: 1rem;
    }

    /* responsive */
    @media (max-width: 480px) {
      .topbar.compact {
        padding: 0.8rem 1rem;
      }
      .download-panel {
        padding: 1.8rem;
      }
      h1 {
        font-size: 1.5rem;
      }
      .timer-wrap {
        width: 110px;
        height: 110px;
      }
    }
  </style>

</head>

      // circumference for ring (r=52 -> 2*pi*52 ≈ 326.7256)
      const circumference = 2 * Math.PI * 52;

      }
      
      function updateTimerUI() {

        if (downloadBtn) {

          } else {
            downloadBtn.disabled = true;

        }
      }
      
      function startCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        updateTimerUI();
        timerInterval = setInterval(() => {
          if (isRedirecting) return;
          if (countdown <= 1) {
            clearInterval(timerInterval);
            countdown = 0;
            updateTimerUI();

        if (fileTitleEl) fileTitleEl.innerText = window.fileData.title || "RGX Secure Asset";

        if (isRedirecting) return;

        if (timerInterval) clearInterval(timerInterval);

        // perform redirect after slight delay to show dialog (original behaviour)

            window.location.href = targetUrl;
          } else {
            // treat as internal
            window.location.href = targetUrl;
          }
        }, 1200);
      }
      
      function attachEvents() {
        if (downloadBtn) {
          downloadBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (countdown <= 0 && !isRedirecting) {
              executeRedirect();
            } else if (countdown > 0) {
              // visual feedback - but not change logic
              downloadBtn.style.transform = "scale(0.98)";
              setTimeout(() => { if(downloadBtn) downloadBtn.style.transform = ""; }, 150);
            }
          });
        }
        if (fallbackBtn) {
          // fallback just goes home, original behavior.
        }
      }
      
      function resetFromFallback() {
        // edge cases handled originally
      }
      
      // Initialize everything as original flow
      updateFileInfo();
      startCountdown();
      attachEvents();
      
      // In case there is a need for manual reset when fallback shown? Original download.js might handle fallback button visibility.
      // According to classic implementation: the fallback button appears if download fails? But we preserve simple logic: fallback only if something missing
      // But we keep the hidden class for fallbackBtn since original download logic might show it later. For consistency, keep as is.
      // Additionally, original would also maybe show fallback if no download link? We'll keep initial hidden.
      // Also we add extra inline style to handle gradient definitions - done
      
      // Expose methods if needed for compatibility (just in case)

      // if window.downloadInit is used? we simulate same environment
      console.log("RGX download logic active - UI upgraded, logic unchanged");
